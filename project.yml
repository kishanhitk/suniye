name: Suniye
options:
  createIntermediateGroups: true
schemes:
  Suniye:
    build:
      targets:
        Suniye: all
    test:
      gatherCoverageData: false
      targets:
        - name: SuniyeTests
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: 14.0
    MARKETING_VERSION: 0.0.8
    CURRENT_PROJECT_VERSION: 8
targets:
  Suniye:
    type: application
    platform: macOS
    sources:
      - Suniye
    info:
      path: Suniye/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ATSApplicationFontsPath: "."
        LSUIElement: true
        NSMicrophoneUsageDescription: Suniye needs microphone access to capture dictation.
        VSUpdateRepoOwner: kishanhitk
        VSUpdateRepoName: suniye
        VSUpdatePreferredAssetName: Suniye.dmg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.suniye.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Suniye/Suniye-Bridging-Header.h
        OTHER_LDFLAGS:
          - -ObjC
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Suniye/Frameworks
    dependencies:
      - framework: Suniye/Frameworks/libsherpa-onnx-c-api.dylib
      - framework: Suniye/Frameworks/libonnxruntime.dylib
  SuniyeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SuniyeTests
    dependencies:
      - target: Suniye
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.suniye.app.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Suniye.app/Contents/MacOS/Suniye"
        BUNDLE_LOADER: "$(TEST_HOST)"
