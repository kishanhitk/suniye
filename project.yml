name: Suniye
options:
  createIntermediateGroups: true
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: 14.0
targets:
  Suniye:
    type: application
    platform: macOS
    sources:
      - Suniye
    info:
      path: Suniye/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: Suniye needs microphone access to capture dictation.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.suniye.app
        SWIFT_OBJC_BRIDGING_HEADER: Suniye/Suniye-Bridging-Header.h
        OTHER_LDFLAGS:
          - -ObjC
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Suniye/Frameworks
    dependencies:
      - framework: Suniye/Frameworks/libsherpa-onnx-c-api.dylib
      - framework: Suniye/Frameworks/libonnxruntime.dylib
  SuniyeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SuniyeTests
    dependencies:
      - target: Suniye
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.suniye.app.tests
        GENERATE_INFOPLIST_FILE: YES
