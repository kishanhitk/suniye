name: VibeStoke
options:
  createIntermediateGroups: true
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: 14.0
targets:
  VibeStoke:
    type: application
    platform: macOS
    sources:
      - VibeStoke
    info:
      path: VibeStoke/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: VibeStoke needs microphone access to capture dictation.
        VSUpdateRepoOwner: kishanhitk
        VSUpdateRepoName: vibestroke
        VSUpdatePreferredAssetName: VibeStoke.dmg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vibestroke.app
        SWIFT_OBJC_BRIDGING_HEADER: VibeStoke/VibeStoke-Bridging-Header.h
        OTHER_LDFLAGS:
          - -ObjC
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/VibeStoke/Frameworks
    dependencies:
      - framework: VibeStoke/Frameworks/libsherpa-onnx-c-api.dylib
      - framework: VibeStoke/Frameworks/libonnxruntime.dylib
  VibeStokeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - VibeStokeTests
    dependencies:
      - target: VibeStoke
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.vibestroke.app.tests
        GENERATE_INFOPLIST_FILE: YES
