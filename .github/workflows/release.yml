name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Preflight
        run: ./scripts/e2e_preflight.sh

      - name: Setup model
        run: ./scripts/setup_model.sh

      - name: Smoke checks
        run: ./scripts/e2e_smoke.sh

      - name: Unit tests
        run: |
          xcodegen generate --spec project.yml
          xcodebuild \
            -project Suniye.xcodeproj \
            -scheme Suniye \
            -destination 'platform=macOS' \
            -derivedDataPath .derivedData \
            test

      - name: Package release artifacts
        run: ./scripts/package_release.sh --version "${GITHUB_REF_NAME}" --build-number "${GITHUB_RUN_NUMBER}" --dist-dir dist

      - name: Verify release artifacts
        run: ./scripts/verify_release.sh --version "${GITHUB_REF_NAME}" --dist-dir dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Suniye.dmg
            dist/Suniye.app.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
